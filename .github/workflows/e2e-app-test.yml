name: E2E App Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

# All tests run against a container launched by the actual Electron app.
# This ensures the docker flags, volume mounts, token format, and launch
# script generated by server.ts are tested end-to-end — no hand-maintained
# docker run commands that can drift from the real app behavior.
#
# Engine coverage:
#   Docker    — Linux, macOS, Windows (primary engine)
#   Podman    — Linux only (pre-installed on ubuntu runners)
#   TinyRange — Linux only (bundled in app, needs KVM for QEMU)

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Docker on all platforms
          - os: linux
            runner: ubuntu-latest
            engine: docker
          - os: macos
            runner: macos-latest
            engine: docker
          - os: windows
            runner: windows-latest
            engine: docker
          # Podman on Linux
          - os: linux
            runner: ubuntu-latest
            engine: podman
          # TinyRange on Linux (QEMU-based VM)
          - os: linux
            runner: ubuntu-latest
            engine: tinyrange

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    defaults:
      run:
        shell: bash

    steps:
      # ───────────────────────────────────────────────
      # Setup
      # ───────────────────────────────────────────────

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: |
          npm install --global yarn --prefer-offline
          yarn install

      - name: Setup Docker (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install docker colima
          # Use Apple Virtualization.framework (vz) instead of QEMU on Apple Silicon.
          # The QEMU driver hits a Lima panic ("send on closed channel") on recent
          # Homebrew versions. vz is faster and more stable on arm64 runners.
          colima start --memory 4 --disk 60 --vm-type=vz
          docker info

      - name: Setup Docker (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          # windows-latest runners have Docker CLI but the engine service is stopped.
          Start-Service docker
          docker info

      - name: Build unpacked app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn pack

      - name: Install xvfb (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get install -y xvfb

      # ───────────────────────────────────────────────
      # Launch app with selected engine
      # ───────────────────────────────────────────────

      - name: Pre-configure app settings
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            SETTINGS_DIR="$HOME/.config/neurodeskapp"
          elif [ "${{ matrix.os }}" = "macos" ]; then
            SETTINGS_DIR="$HOME/Library/Application Support/neurodeskapp"
          else
            SETTINGS_DIR="$APPDATA/neurodeskapp"
          fi

          mkdir -p "$SETTINGS_DIR"
          printf '%s\n' '{' \
            '  "startupMode": "new-local-session",' \
            '  "engineType": "${{ matrix.engine }}",' \
            '  "logLevel": "debug",' \
            '  "checkForUpdatesAutomatically": false' \
            '}' > "$SETTINGS_DIR/settings.json"

          echo "=== Settings ==="
          cat "$SETTINGS_DIR/settings.json"

          # Create storage and working directories
          mkdir -p ~/neurodesktop-storage
          if [ "${{ matrix.os }}" = "windows" ]; then
            mkdir -p "$TEMP/neurodesk-test"
          else
            mkdir -p /tmp/neurodesk-test
          fi

      - name: Launch app in background
        id: app
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            WORKING_DIR="/tmp/neurodesk-test"
            xvfb-run --auto-servernum dist/linux-unpacked/neurodeskapp \
              --working-dir "$WORKING_DIR" --log-level debug &
            APP_PID=$!
          elif [ "${{ matrix.os }}" = "macos" ]; then
            WORKING_DIR="/tmp/neurodesk-test"
            dist/mac-arm64/NeurodeskApp.app/Contents/MacOS/NeurodeskApp \
              --working-dir "$WORKING_DIR" --log-level debug &
            APP_PID=$!
          else
            WORKING_DIR="$TEMP/neurodesk-test"
            dist/win-unpacked/NeurodeskApp.exe \
              --working-dir "$WORKING_DIR" --log-level debug &
            APP_PID=$!
          fi

          echo "pid=$APP_PID" >> "$GITHUB_OUTPUT"
          echo "working_dir=$WORKING_DIR" >> "$GITHUB_OUTPUT"
          echo "Launched app with PID $APP_PID, engine=${{ matrix.engine }}, working dir: $WORKING_DIR"

      # ───────────────────────────────────────────────
      # App orchestration tests
      # ───────────────────────────────────────────────

      - name: 'Test: App starts container/VM and Jupyter becomes reachable'
        id: container
        run: |
          APP_PID=${{ steps.app.outputs.pid }}
          ENGINE="${{ matrix.engine }}"
          echo "Waiting for app (PID $APP_PID) to start $ENGINE backend..."

          # For Docker/Podman we discover the container via CLI.
          # For TinyRange we just poll the Jupyter HTTP endpoint since there's no container.
          CONTAINER=""
          PORT=""
          TOKEN=""

          for i in $(seq 1 120); do
            # Fail fast if the Electron app process has already exited
            if [ "${{ matrix.os }}" = "windows" ]; then
              APP_ALIVE=$(tasklist //FI "PID eq $APP_PID" 2>/dev/null | grep -c "$APP_PID" || true)
            else
              APP_ALIVE=$(kill -0 "$APP_PID" 2>/dev/null && echo 1 || echo 0)
            fi
            if [ "$APP_ALIVE" = "0" ]; then
              echo "FAIL: Electron app (PID $APP_PID) exited before backend was ready"
              echo "=== Checking for app logs ==="
              if [ "${{ matrix.os }}" = "linux" ]; then
                cat "$HOME/.config/neurodeskapp/logs/main.log" 2>/dev/null || true
              elif [ "${{ matrix.os }}" = "macos" ]; then
                cat "$HOME/Library/Logs/neurodeskapp/main.log" 2>/dev/null || true
              else
                cat "$APPDATA/neurodeskapp/logs/main.log" 2>/dev/null || true
              fi
              exit 1
            fi

            if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
              CONTAINER=$($ENGINE ps --filter "name=neurodeskapp-" --format "{{.Names}}" | head -1)
              if [ -n "$CONTAINER" ]; then
                PORT="${CONTAINER##*-}"
                TOKEN=$($ENGINE inspect "$CONTAINER" --format '{{json .Config.Cmd}}' | grep -oE "jlab:srvr:[a-f0-9]+")
                echo "Container found: $CONTAINER (port=$PORT) after $((i * 15))s"
                break
              fi
            else
              # TinyRange: no container to discover. Scan for a listening port
              # started by the app. The app logs the port, but we can also check
              # common port range. Try ports from the app log.
              if [ "${{ matrix.os }}" = "linux" ]; then
                LOG_FILE="$HOME/.config/neurodeskapp/logs/main.log"
              elif [ "${{ matrix.os }}" = "macos" ]; then
                LOG_FILE="$HOME/Library/Logs/neurodeskapp/main.log"
              else
                LOG_FILE="$APPDATA/neurodeskapp/logs/main.log"
              fi
              if [ -f "$LOG_FILE" ]; then
                # Extract port and token from app log
                PORT=$(grep -oE 'ServerApp\.port=[0-9]+' "$LOG_FILE" 2>/dev/null | tail -1 | grep -oE '[0-9]+' || true)
                TOKEN=$(grep -oE 'jlab:srvr:[a-f0-9]+' "$LOG_FILE" 2>/dev/null | tail -1 || true)
                if [ -n "$PORT" ] && [ -n "$TOKEN" ]; then
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${PORT}/lab?token=${TOKEN}" 2>/dev/null || echo "000")
                  if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] 2>/dev/null; then
                    echo "TinyRange Jupyter reachable on port $PORT after $((i * 15))s"
                    CONTAINER="tinyrange-vm"
                    break
                  fi
                fi
              fi
            fi

            echo "Attempt $i: no backend yet - waiting 15s..."
            sleep 15
          done

          if [ -z "$CONTAINER" ] && [ "$ENGINE" != "tinyrange" ]; then
            echo "FAIL: No neurodeskapp container appeared within 30 minutes"
            echo "=== App process status ==="
            ps -p "$APP_PID" -o pid,stat,command 2>/dev/null || echo "App process no longer running"
            exit 1
          fi

          if [ -z "$PORT" ] || [ -z "$TOKEN" ]; then
            echo "FAIL: Could not discover port/token for $ENGINE backend"
            if [ "${{ matrix.os }}" = "linux" ]; then
              cat "$HOME/.config/neurodeskapp/logs/main.log" 2>/dev/null || true
            fi
            exit 1
          fi

          # Verify token format
          if ! echo "$TOKEN" | grep -qE '^jlab:srvr:[a-f0-9]+$'; then
            echo "FAIL: Token not in expected jlab:srvr:<hex> format: $TOKEN"
            exit 1
          fi
          echo "PASS: Backend started with correct token format"

          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "container=$CONTAINER" >> "$GITHUB_OUTPUT"

      - name: 'Test: App-generated docker/podman flags are correct'
        if: matrix.engine == 'docker' || matrix.engine == 'podman'
        run: |
          ENGINE="${{ matrix.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          echo "=== Inspecting container config generated by server.ts ($ENGINE) ==="

          # Verify --privileged
          PRIV=$($ENGINE inspect "$CONTAINER_NAME" --format '{{.HostConfig.Privileged}}')
          if [ "$PRIV" = "true" ]; then
            echo "PASS: Container is privileged"
          else
            echo "FAIL: Container is not privileged"
            exit 1
          fi

          # Verify volume mounts exist
          echo "=== Volume mounts ==="
          $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{"\n"}}{{end}}'

          # Verify neurodesktop-storage mount
          if $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Mounts}}{{.Destination}}{{"\n"}}{{end}}' | grep -q '/neurodesktop-storage'; then
            echo "PASS: /neurodesktop-storage mount present"
          else
            echo "FAIL: /neurodesktop-storage mount missing"
            exit 1
          fi

          # Verify /data mount (from --working-dir)
          if $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Mounts}}{{.Destination}}{{"\n"}}{{end}}' | grep -q '/data'; then
            echo "PASS: /data mount present (working dir)"
          else
            echo "FAIL: /data mount missing - server.ts did not mount working dir"
            exit 1
          fi

          # Verify NEURODESKTOP_VERSION env var
          if $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Config.Env}}{{.}}{{"\n"}}{{end}}' | grep -q 'NEURODESKTOP_VERSION='; then
            echo "PASS: NEURODESKTOP_VERSION env var set"
          else
            echo "FAIL: NEURODESKTOP_VERSION env var missing"
            exit 1
          fi

      - name: Wait for Jupyter server ready
        run: |
          PORT=${{ steps.container.outputs.port }}
          TOKEN=${{ steps.container.outputs.token }}
          URL="http://127.0.0.1:${PORT}/lab?token=${TOKEN}"

          echo "Waiting for Jupyter at $URL ..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] 2>/dev/null; then
              echo "Server is up (HTTP $STATUS) after $((i * 5))s"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - waiting 5s..."
            sleep 5
          done

          echo "Server failed to start within 5 minutes"
          echo "=== Container/VM logs ==="
          if [ "${{ matrix.engine }}" != "tinyrange" ]; then
            ${{ matrix.engine }} logs "${{ steps.container.outputs.container }}" 2>&1 || true
          fi
          exit 1

      # ───────────────────────────────────────────────
      # Container functionality tests
      # (docker exec / podman exec for container engines,
      #  Jupyter API for TinyRange since there's no shell access)
      # ───────────────────────────────────────────────

      - name: 'Test: Terminal - module load + FSL bet'
        if: matrix.engine == 'docker' || matrix.engine == 'podman'
        run: |
          ENGINE="${{ matrix.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          echo "=== Loading FSL module via terminal ($ENGINE exec) ==="
          OUTPUT=$($ENGINE exec "$CONTAINER_NAME" bash -c '
            source /etc/profile
            module load fsl/6.0.7.16
            bet 2>&1 | head -5
          ')
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "usage\|bet"; then
            echo "PASS: Terminal module load + tool use"
          else
            echo "FAIL: bet output did not contain expected text"
            exit 1
          fi

      - name: 'Test: Notebook - module load + FSL bet via papermill'
        if: matrix.engine == 'docker' || matrix.engine == 'podman'
        run: |
          ENGINE="${{ matrix.engine }}"
          PORT=${{ steps.container.outputs.port }}
          TOKEN=${{ steps.container.outputs.token }}
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          echo "=== Creating test notebook via Jupyter API ==="
          NOTEBOOK_JSON='{"type":"notebook","content":{"cells":[{"cell_type":"code","source":["import module\nawait module.load(\"fsl/6.0.7.16\")\nawait module.list()"],"metadata":{},"outputs":[],"execution_count":null},{"cell_type":"code","source":["import subprocess\nresult = subprocess.run([\"bet\"], capture_output=True, text=True)\nprint(result.stderr[:200])\nassert \"bet\" in result.stderr.lower() or \"usage\" in result.stderr.lower(), \"bet command not working\""],"metadata":{},"outputs":[],"execution_count":null},{"cell_type":"code","source":["print(\"NOTEBOOK_TEST_PASSED\")"],"metadata":{},"outputs":[],"execution_count":null}],"metadata":{"kernelspec":{"display_name":"Python 3","language":"python","name":"python3"}},"nbformat":4,"nbformat_minor":4}}'

          curl -sf -X PUT \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$NOTEBOOK_JSON" \
            "http://127.0.0.1:${PORT}/api/contents/ci_test.ipynb"

          echo "=== Installing papermill ==="
          $ENGINE exec "$CONTAINER_NAME" pip install -q papermill

          echo "=== Executing notebook with papermill ==="
          $ENGINE exec "$CONTAINER_NAME" papermill ci_test.ipynb ci_test_output.ipynb --no-progress-bar

          echo "=== Verifying notebook output ==="
          $ENGINE exec "$CONTAINER_NAME" python3 -c "
          import json
          with open('/home/jovyan/ci_test_output.ipynb') as f:
              nb = json.load(f)
          passed = False
          for cell in nb['cells']:
              for out in cell.get('outputs', []):
                  text = ''.join(out.get('text', []))
                  if 'NOTEBOOK_TEST_PASSED' in text:
                      passed = True
                  if 'error' in out.get('output_type', ''):
                      print('ERROR:', out.get('evalue', ''))
                      exit(1)
          assert passed, 'NOTEBOOK_TEST_PASSED not found in output'
          print('PASS: Notebook executed successfully')
          "

      - name: 'Test: Notebook execution via Jupyter API (TinyRange)'
        if: matrix.engine == 'tinyrange'
        run: |
          PORT=${{ steps.container.outputs.port }}
          TOKEN=${{ steps.container.outputs.token }}

          echo "=== Creating test notebook via Jupyter API ==="
          NOTEBOOK_JSON='{"type":"notebook","content":{"cells":[{"cell_type":"code","source":["import subprocess\nresult = subprocess.run([\"echo\", \"hello-from-tinyrange\"], capture_output=True, text=True)\nprint(result.stdout)\nassert \"hello-from-tinyrange\" in result.stdout, \"command failed\""],"metadata":{},"outputs":[],"execution_count":null},{"cell_type":"code","source":["print(\"NOTEBOOK_TEST_PASSED\")"],"metadata":{},"outputs":[],"execution_count":null}],"metadata":{"kernelspec":{"display_name":"Python 3","language":"python","name":"python3"}},"nbformat":4,"nbformat_minor":4}}'

          curl -sf -X PUT \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$NOTEBOOK_JSON" \
            "http://127.0.0.1:${PORT}/api/contents/ci_test.ipynb"

          echo "=== Starting kernel and executing cells via API ==="
          # Start a kernel
          KERNEL=$(curl -sf -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"python3"}' \
            "http://127.0.0.1:${PORT}/api/kernels")
          KERNEL_ID=$(echo "$KERNEL" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Kernel started: $KERNEL_ID"

          # Execute notebook via /api/contents - read back and check
          # Use the Jupyter execute API by posting to sessions
          echo "=== Verifying Jupyter API is functional ==="
          CONTENTS=$(curl -sf \
            -H "Authorization: token ${TOKEN}" \
            "http://127.0.0.1:${PORT}/api/contents")
          if echo "$CONTENTS" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "PASS: Jupyter API responsive on TinyRange"
          else
            echo "FAIL: Jupyter API not responsive"
            exit 1
          fi

          # Clean up kernel
          curl -sf -X DELETE \
            -H "Authorization: token ${TOKEN}" \
            "http://127.0.0.1:${PORT}/api/kernels/${KERNEL_ID}" || true

      - name: 'Test: File CRUD in /data (working dir)'
        if: matrix.engine == 'docker' || matrix.engine == 'podman'
        run: |
          ENGINE="${{ matrix.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}
          WORKING_DIR="${{ steps.app.outputs.working_dir }}"

          echo "=== 1. Create file from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'echo "workdir-mount-ok" > /data/ci-test.txt'
          if cat "$WORKING_DIR/ci-test.txt" | grep -q "workdir-mount-ok"; then
            echo "PASS: Create file in /data visible on host"
          else
            echo "FAIL: File not visible on host at $WORKING_DIR/ci-test.txt"
            exit 1
          fi

          echo "=== 2. Modify file from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'echo "appended-data" >> /data/ci-test.txt'
          if cat "$WORKING_DIR/ci-test.txt" | grep -q "appended-data"; then
            echo "PASS: Modified content visible on host"
          else
            echo "FAIL: Modified content not visible on host"
            exit 1
          fi

          echo "=== 3. Create file from host, read in container ==="
          echo "host-to-data" > "$WORKING_DIR/ci-host-test.txt"
          CONTENT=$($ENGINE exec "$CONTAINER_NAME" cat /data/ci-host-test.txt)
          if echo "$CONTENT" | grep -q "host-to-data"; then
            echo "PASS: Host-written file readable in container /data"
          else
            echo "FAIL: Host-written file not readable in container /data"
            exit 1
          fi

          echo "=== 4. Create subdirectory and nested files ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'mkdir -p /data/ci-subdir && echo "nested-data" > /data/ci-subdir/nested.txt'
          if cat "$WORKING_DIR/ci-subdir/nested.txt" | grep -q "nested-data"; then
            echo "PASS: Nested directory/file in /data works"
          else
            echo "FAIL: Nested file not visible on host"
            exit 1
          fi

          echo "=== 5. Remove file from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'rm /data/ci-test.txt'
          if [ ! -f "$WORKING_DIR/ci-test.txt" ]; then
            echo "PASS: File removal in /data reflected on host"
          else
            echo "FAIL: File still exists on host after container rm"
            exit 1
          fi

          echo "=== 6. Remove directory from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'rm -rf /data/ci-subdir'
          if [ ! -d "$WORKING_DIR/ci-subdir" ]; then
            echo "PASS: Directory removal in /data reflected on host"
          else
            echo "FAIL: Directory still exists on host after container rm"
            exit 1
          fi

      - name: 'Test: File CRUD in neurodesk-storage'
        if: matrix.engine == 'docker' || matrix.engine == 'podman'
        run: |
          ENGINE="${{ matrix.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}
          STORAGE_DIR="$HOME/neurodesktop-storage"

          echo "=== 1. Create file from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'echo "storage-mount-ok" > /neurodesktop-storage/ci-test.txt'
          if cat "$STORAGE_DIR/ci-test.txt" | grep -q "storage-mount-ok"; then
            echo "PASS: Create file in neurodesk-storage visible on host"
          else
            echo "FAIL: Could not read neurodesk-storage mount from host"
            exit 1
          fi

          echo "=== 2. Modify file from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'echo "modified-content" >> /neurodesktop-storage/ci-test.txt'
          if cat "$STORAGE_DIR/ci-test.txt" | grep -q "modified-content"; then
            echo "PASS: Modified content visible on host"
          else
            echo "FAIL: Modified content not visible on host"
            exit 1
          fi

          echo "=== 3. Create file from host, read in container ==="
          echo "host-to-storage" > "$STORAGE_DIR/ci-host-test.txt"
          CONTENT=$($ENGINE exec "$CONTAINER_NAME" cat /neurodesktop-storage/ci-host-test.txt)
          if echo "$CONTENT" | grep -q "host-to-storage"; then
            echo "PASS: Host-written file readable in container /neurodesktop-storage"
          else
            echo "FAIL: Host-written file not readable in container"
            exit 1
          fi

          echo "=== 4. Create subdirectory and nested files ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'mkdir -p /neurodesktop-storage/ci-subdir && echo "nested-storage" > /neurodesktop-storage/ci-subdir/nested.txt'
          if cat "$STORAGE_DIR/ci-subdir/nested.txt" | grep -q "nested-storage"; then
            echo "PASS: Nested directory/file in neurodesk-storage works"
          else
            echo "FAIL: Nested file not visible on host"
            exit 1
          fi

          echo "=== 5. Remove file from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'rm /neurodesktop-storage/ci-test.txt'
          if [ ! -f "$STORAGE_DIR/ci-test.txt" ]; then
            echo "PASS: File removal reflected on host"
          else
            echo "FAIL: File still exists on host after container rm"
            exit 1
          fi

          echo "=== 6. Remove directory from container ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c 'rm -rf /neurodesktop-storage/ci-subdir'
          if [ ! -d "$STORAGE_DIR/ci-subdir" ]; then
            echo "PASS: Directory removal reflected on host"
          else
            echo "FAIL: Directory still exists on host after container rm"
            exit 1
          fi

      - name: 'Test: File CRUD in neurodesk-storage via Jupyter API (TinyRange)'
        if: matrix.engine == 'tinyrange'
        run: |
          PORT=${{ steps.container.outputs.port }}
          TOKEN=${{ steps.container.outputs.token }}
          STORAGE_DIR="$HOME/neurodesktop-storage"

          echo "=== 1. Create file via Jupyter contents API ==="
          curl -sf -X PUT \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"file","format":"text","content":"tinyrange-test-ok"}' \
            "http://127.0.0.1:${PORT}/api/contents/neurodesktop-storage/ci-test.txt"

          echo "=== 2. Read file back via API ==="
          CONTENT=$(curl -sf \
            -H "Authorization: token ${TOKEN}" \
            "http://127.0.0.1:${PORT}/api/contents/neurodesktop-storage/ci-test.txt" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('content',''))")
          if echo "$CONTENT" | grep -q "tinyrange-test-ok"; then
            echo "PASS: File created and readable via Jupyter API"
          else
            echo "FAIL: File content mismatch: $CONTENT"
            exit 1
          fi

          echo "=== 3. Delete file via API ==="
          curl -sf -X DELETE \
            -H "Authorization: token ${TOKEN}" \
            "http://127.0.0.1:${PORT}/api/contents/neurodesktop-storage/ci-test.txt"
          echo "PASS: File deleted via API"

      - name: 'Test: Graphical app launch (MRICron)'
        if: matrix.os == 'linux' && (matrix.engine == 'docker' || matrix.engine == 'podman')
        run: |
          ENGINE="${{ matrix.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          echo "=== Loading MRICron module and verifying launch ==="
          $ENGINE exec "$CONTAINER_NAME" bash -c '
            source /etc/profile
            module load mricron/1.0.20190902

            echo "--- which mricron ---"
            which mricron || { echo "FAIL: mricron not found"; exit 1; }

            # Start virtual framebuffer and launch mricron briefly
            export DISPLAY=:99
            Xvfb :99 -screen 0 1024x768x24 &
            XVFB_PID=$!
            sleep 2

            # Launch mricron in background, give it time to start
            mricron &
            APP_PID=$!
            sleep 5

            # Check if the process is still running (did not crash on startup)
            if kill -0 $APP_PID 2>/dev/null; then
              echo "PASS: MRICron launched successfully (PID $APP_PID)"
              kill $APP_PID 2>/dev/null || true
            else
              echo "FAIL: MRICron process exited prematurely"
              kill $XVFB_PID 2>/dev/null || true
              exit 1
            fi

            kill $XVFB_PID 2>/dev/null || true
          '

      # ───────────────────────────────────────────────
      # Shutdown test
      # ───────────────────────────────────────────────

      - name: 'Test: Clean shutdown via app (SIGTERM -> backend stop)'
        run: |
          APP_PID=${{ steps.app.outputs.pid }}
          ENGINE="${{ matrix.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          echo "=== Sending SIGTERM to Electron app (PID $APP_PID) ==="
          if [ "${{ matrix.os }}" = "windows" ]; then
            taskkill //PID $APP_PID //T //F 2>/dev/null || true
          else
            kill -TERM "$APP_PID" 2>/dev/null || true
          fi

          echo "=== Waiting for backend to stop ==="
          if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
            for i in $(seq 1 12); do
              if ! $ENGINE ps -q -f "name=$CONTAINER_NAME" | grep -q .; then
                echo "PASS: Container stopped after app shutdown ($((i * 5))s)"
                exit 0
              fi
              sleep 5
            done
            echo "WARN: Container did not stop within 60s after app shutdown"
            echo "This means the app's dispose -> killAllServers -> server.stop chain may not be working"
            exit 1
          else
            # TinyRange: check that the port is no longer listening
            PORT=${{ steps.container.outputs.port }}
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${PORT}/" 2>/dev/null || echo "000")
              if [ "$STATUS" = "000" ]; then
                echo "PASS: TinyRange VM stopped after app shutdown ($((i * 5))s)"
                exit 0
              fi
              sleep 5
            done
            echo "WARN: TinyRange port still responding after 60s"
            exit 1
          fi

      # ───────────────────────────────────────────────
      # Cleanup
      # ───────────────────────────────────────────────

      - name: Cleanup
        if: always()
        run: |
          APP_PID=${{ steps.app.outputs.pid }}
          ENGINE="${{ matrix.engine }}"

          echo "=== Electron app logs ==="
          if [ "${{ matrix.os }}" = "linux" ]; then
            LOG_FILE="$HOME/.config/neurodeskapp/logs/main.log"
          elif [ "${{ matrix.os }}" = "macos" ]; then
            LOG_FILE="$HOME/Library/Logs/neurodeskapp/main.log"
          else
            LOG_FILE="$APPDATA/neurodeskapp/logs/main.log"
          fi
          if [ -f "$LOG_FILE" ]; then
            echo "--- $LOG_FILE ---"
            cat "$LOG_FILE" 2>/dev/null || true
          else
            echo "No electron log file found at $LOG_FILE"
          fi

          echo "=== Container/VM logs ==="
          if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
            CONTAINER_NAME=${{ steps.container.outputs.container }}
            if [ -n "$CONTAINER_NAME" ]; then
              $ENGINE logs "$CONTAINER_NAME" 2>&1 | tail -50 || true
            fi
          fi

          echo "=== Force cleanup ==="
          # Kill app if still running
          if [ -n "$APP_PID" ]; then
            if [ "${{ matrix.os }}" = "windows" ]; then
              taskkill //PID $APP_PID //T //F 2>/dev/null || true
            else
              kill -9 "$APP_PID" 2>/dev/null || true
            fi
          fi

          # Remove any leftover containers (Docker/Podman)
          if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
            $ENGINE ps -a --filter "name=neurodeskapp-" --format "{{.Names}}" | while read name; do
              $ENGINE rm -f "$name" 2>/dev/null || true
            done
            $ENGINE volume rm neurodesk-home 2>/dev/null || true
          fi

          # Kill any leftover tinyrange/qemu processes
          if [ "$ENGINE" = "tinyrange" ]; then
            killall tinyrange 2>/dev/null || true
            killall qemu-system-x86_64 2>/dev/null || true
          fi

          # Clean up test files
          WORKING_DIR="${{ steps.app.outputs.working_dir }}"
          rm -rf "$WORKING_DIR" 2>/dev/null || true
          rm -rf ~/neurodesktop-storage/ci-test.txt ~/neurodesktop-storage/ci-host-test.txt ~/neurodesktop-storage/ci-subdir 2>/dev/null || true
