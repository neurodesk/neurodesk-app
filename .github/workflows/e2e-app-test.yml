name: E2E App Test

on:
  workflow_call: # Called from publish.yml after build artifacts are ready
  workflow_dispatch: # Manual trigger (will build from source)

# All tests run against a container launched by the actual Electron app.
# This ensures the docker flags, volume mounts, token format, and launch
# script generated by server.ts are tested end-to-end — no hand-maintained
# docker run commands that can drift from the real app behavior.
#
# Engine coverage:
#   Docker    — Linux, macOS, Windows (primary engine)
#   Podman    — Linux only (pre-installed on ubuntu runners)
#   TinyRange — Linux only (bundled in app, needs KVM for QEMU)

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - { platform: linux-64, platform_name: Linux x64,  os: ubuntu-23.04, tinyrange_os: linux-amd64, engine: docker, artifact: NeurodeskApp-debian-installer-x64 }
          - { platform: mac, platform_name: macOS, os: macos-15, tinyrange_os: darwin-arm64, engine: tinyrange, artifact: NeurodeskApp-mac-installer-arm64 }
          # - { platform: win, platform_name: Windows, os: windows-latest, tinyrange_os: windows-amd64, engine: tinyrange, artifact: NeurodeskApp-windows-installer }
          # - { platform: linux-64, platform_name: Linux x64,  os: ubuntu-latest, tinyrange_os: linux-amd64, engine: tinyrange, artifact: NeurodeskApp-debian-installer-x64 }

    runs-on: ${{ matrix.cfg.os }}
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      # ───────────────────────────────────────────────
      # Setup
      # ───────────────────────────────────────────────

      - name: Checkout
        uses: actions/checkout@v6

      # Try to download pre-built artifact from the calling workflow.
      # If this was triggered via workflow_dispatch (no artifacts), fall back to building.
      - name: Download installer artifact
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ matrix.cfg.artifact }}
          path: dist/

      # Fallback: build from source when no artifact is available (workflow_dispatch)
      - name: Install node
        if: steps.download.outcome == 'failure'
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Install dependencies (fallback build)
        if: steps.download.outcome == 'failure'
        run: |
          npm install --global yarn --prefer-offline
          yarn install

      - name: Get TinyRange version (fallback build)
        if: steps.download.outcome == 'failure'
        id: package-info
        run: |
          echo "tinyrange_version=$(python3 scripts/get_package_version.py --package_name tinyrange)" >> "$GITHUB_OUTPUT"

      - name: Install TinyRange (fallback build)
        if: steps.download.outcome == 'failure'
        run: |
          TR_VERSION="${{ steps.package-info.outputs.tinyrange_version }}"
          if [ -z "$TR_VERSION" ]; then
            echo "FAIL: tinyrange_version is empty — python script may have failed"
            exit 1
          fi
          curl -fSL -o tinyrange.zip "https://github.com/tinyrange/tinyrange/releases/download/v${TR_VERSION}/tinyrange-${{ matrix.cfg.tinyrange_os }}.zip"
          unzip tinyrange.zip

      - name: Build distribution package (fallback build)
        if: steps.download.outcome == 'failure'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          yarn dist:${{ matrix.cfg.platform }}

      - name: Install app (Linux)
        if: matrix.cfg.platform == 'linux-64' || matrix.cfg.platform == 'linux-arm64'
        run: |
          sudo apt-get install -y xvfb
          sudo dpkg -i dist/NeurodeskApp.deb || true
          sudo apt-get install -y -f

      - name: Install app (macOS)
        if: matrix.cfg.platform == 'mac'
        run: |
          brew install qemu
          hdiutil attach dist/NeurodeskApp-arm64.dmg -nobrowse -quiet -mountpoint /Volumes/NeurodeskApp
          cp -R "/Volumes/NeurodeskApp/NeurodeskApp.app" /Applications/
          hdiutil detach "/Volumes/NeurodeskApp" -quiet

      - name: Install app (Windows)
        if: matrix.cfg.platform == 'win'
        shell: pwsh
        run: |
          echo "Using dist/win-unpacked/ directly (no installer needed)"

      - name: Install websocket client
        run: |
          python3 -m pip install --upgrade --break-system-packages --user websocket-client requests

      - name: Setup Podman for rootless CI
        if: matrix.cfg.engine == 'podman'
        run: |
          mkdir -p ~/.config/containers
          printf '%s\n' \
            '[engine]' \
            'cgroup_manager = "cgroupfs"' \
            'events_logger = "file"' \
            > ~/.config/containers/containers.conf

          # Start D-Bus session bus for slirp4netns port forwarding
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"

          podman info --format '{{.Host.CgroupManager}}'

      # ───────────────────────────────────────────────
      # Launch app with selected engine
      # ───────────────────────────────────────────────

      - name: Pre-configure app settings
        run: |
          if [ "${{ matrix.cfg.platform }}" = "linux-64" ] || [ "${{ matrix.cfg.platform }}" = "linux-arm64" ]; then
            SETTINGS_DIR="$HOME/.config/neurodeskapp"
          elif [ "${{ matrix.cfg.platform }}" = "mac" ]; then
            SETTINGS_DIR="$HOME/Library/Application Support/neurodeskapp"
          else
            SETTINGS_DIR="$APPDATA/neurodeskapp"
          fi

          mkdir -p "$SETTINGS_DIR"
          printf '%s\n' '{' \
            '  "startupMode": "new-local-session",' \
            '  "engineType": "${{ matrix.cfg.engine }}",' \
            '  "logLevel": "debug",' \
            '  "checkForUpdatesAutomatically": false' \
            '}' > "$SETTINGS_DIR/settings.json"

          echo "=== Settings ==="
          cat "$SETTINGS_DIR/settings.json"

          # Create storage and working directories
          mkdir -p ~/neurodesktop-storage
          chmod 777 ~/neurodesktop-storage
          if [ "${{ matrix.cfg.platform }}" = "win" ]; then
            mkdir -p "$TEMP/neurodesk-test"
          else
            mkdir -p /tmp/neurodesk-test
          fi

      - name: Launch app in background
        id: app
        run: |
          APP_LOG="/tmp/neurodeskapp-stdout.log"

          if [ "${{ matrix.cfg.platform }}" = "linux-64" ] || [ "${{ matrix.cfg.platform }}" = "linux-arm64" ]; then
            WORKING_DIR="/tmp/neurodesk-test"
            APP_BIN="/opt/NeurodeskApp/neurodeskapp"
          elif [ "${{ matrix.cfg.platform }}" = "mac" ]; then
            WORKING_DIR="/tmp/neurodesk-test"
            APP_BIN="/Applications/NeurodeskApp.app/Contents/MacOS/NeurodeskApp"
          else
            WORKING_DIR="$TEMP/neurodesk-test"
            APP_BIN="dist/NeurodeskApp-Setup.exe"
            APP_LOG="$TEMP/neurodeskapp-stdout.log"
          fi

          # Verify binary exists
          if [ ! -f "$APP_BIN" ]; then
            echo "FAIL: App binary not found at $APP_BIN"
            echo "=== dist/ contents ==="
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            ls -la dist/*/ 2>/dev/null || true
            exit 1
          fi

          # Launch with stdout/stderr captured for diagnostics
          if [ "${{ matrix.cfg.platform }}" = "linux-64" ] || [ "${{ matrix.cfg.platform }}" = "linux-arm64" ]; then
            xvfb-run --auto-servernum "$APP_BIN" \
              --working-dir "$WORKING_DIR" --log-level debug \
              > "$APP_LOG" 2>&1 &
            APP_PID=$!
          else
            "$APP_BIN" \
              --working-dir "$WORKING_DIR" --log-level debug \
              > "$APP_LOG" 2>&1 &
            APP_PID=$!
          fi

          # Brief wait then check it didn't crash immediately
          sleep 5
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "FAIL: App exited within 5 seconds of launch"
            echo "=== App stdout/stderr ==="
            cat "$APP_LOG" 2>/dev/null || true
            exit 1
          fi

          echo "pid=$APP_PID" >> "$GITHUB_OUTPUT"
          echo "working_dir=$WORKING_DIR" >> "$GITHUB_OUTPUT"
          echo "app_log=$APP_LOG" >> "$GITHUB_OUTPUT"
          echo "Launched app with PID $APP_PID, engine=${{ matrix.cfg.engine }}, working dir: $WORKING_DIR"

      # ───────────────────────────────────────────────
      # App orchestration tests
      # ───────────────────────────────────────────────

      - name: 'Test: App starts container/VM and Jupyter becomes reachable'
        id: container
        run: |
          APP_PID=${{ steps.app.outputs.pid }}
          ENGINE="${{ matrix.cfg.engine }}"
          echo "Waiting for app (PID $APP_PID) to start $ENGINE backend..."

          # For Docker/Podman we discover the container via CLI.
          # For TinyRange we just poll the Jupyter HTTP endpoint since there's no container.
          CONTAINER=""
          PORT=""
          TOKEN=""

          for i in $(seq 1 120); do
            # Fail fast if the Electron app process has already exited
            if [ "${{ matrix.cfg.platform }}" = "mac" ]; then
              APP_ALIVE=$(pgrep -f "NeurodeskApp.app/Contents/MacOS/NeurodeskApp" >/dev/null 2>&1 && echo 1 || echo 0)
            elif [ "${{ matrix.cfg.platform }}" = "win" ]; then
              APP_ALIVE=$(tasklist //FI "IMAGENAME eq NeurodeskApp.exe" 2>/dev/null | grep -q NeurodeskApp && echo 1 || echo 0)
            else
              APP_ALIVE=$(pgrep -x neurodeskapp >/dev/null 2>&1 && echo 1 || echo 0)
            fi
            if [ "$APP_ALIVE" = "0" ]; then
              echo "FAIL: Electron app exited before backend was ready"
              echo "=== Checking for app logs ==="
              if [ "${{ matrix.cfg.platform }}" = "linux-64" ] || [ "${{ matrix.cfg.platform }}" = "linux-arm64" ]; then
                cat "$HOME/.config/neurodeskapp/logs/main.log" 2>/dev/null || true
              elif [ "${{ matrix.cfg.platform }}" = "mac" ]; then
                cat "$HOME/Library/Logs/neurodeskapp/main.log" 2>/dev/null || true
              else
                cat "$APPDATA/neurodeskapp/logs/main.log" 2>/dev/null || true
              fi
              exit 1
            fi

            if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
              CONTAINER=$($ENGINE ps --filter "name=neurodeskapp" --format "{{.Names}}" | head -1)
              if [ -n "$CONTAINER" ]; then
                # Container name is fixed "neurodeskapp" — get port from published port mapping
                PORT=$($ENGINE inspect "$CONTAINER" --format '{{range $p, $conf := .NetworkSettings.Ports}}{{range $conf}}{{.HostPort}}{{"\n"}}{{end}}{{end}}' | grep -oE '[0-9]+' | head -1)
                TOKEN=$($ENGINE inspect "$CONTAINER" --format '{{json .Config.Cmd}}' | grep -oE "jlab:srvr:[a-f0-9]+")
                echo "Container found: $CONTAINER (port=$PORT) after $((i * 15))s"
                break
              fi
            else
              # TinyRange: no container to discover. Scan for a listening port
              # started by the app. The app logs the port, but we can also check
              # common port range. Try ports from the app log.
              if [ "${{ matrix.cfg.platform }}" = "linux-64" ] || [ "${{ matrix.cfg.platform }}" = "linux-arm64" ]; then
                LOG_FILE="$HOME/.config/neurodeskapp/logs/main.log"
              elif [ "${{ matrix.cfg.platform }}" = "mac" ]; then
                LOG_FILE="$HOME/Library/Logs/neurodeskapp/main.log"
              else
                LOG_FILE="$APPDATA/neurodeskapp/logs/main.log"
              fi
              if [ -f "$LOG_FILE" ]; then
                # Extract port and token from app log
                PORT=$(grep -oE 'ServerApp\.port=[0-9]+' "$LOG_FILE" 2>/dev/null | tail -1 | grep -oE '[0-9]+' || true)
                TOKEN=$(grep -oE 'jlab:srvr:[a-f0-9]+' "$LOG_FILE" 2>/dev/null | tail -1 || true)
                if [ -n "$PORT" ] && [ -n "$TOKEN" ]; then
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${PORT}/lab?token=${TOKEN}" 2>/dev/null || echo "000")
                  if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] 2>/dev/null; then
                    echo "TinyRange Jupyter reachable on port $PORT after $((i * 15))s"
                    CONTAINER="tinyrange-vm"
                    break
                  fi
                fi
              fi
            fi

            echo "Attempt $i: no backend yet - waiting 15s..."
            sleep 15
          done

          if [ -z "$CONTAINER" ] && [ "$ENGINE" != "tinyrange" ]; then
            echo "FAIL: No neurodeskapp container appeared within 30 minutes"
            echo "=== App process status ==="
            ps -p "$APP_PID" -o pid,stat,command 2>/dev/null || echo "App process no longer running"
            exit 1
          fi

          if [ -z "$PORT" ] || [ -z "$TOKEN" ]; then
            echo "FAIL: Could not discover port/token for $ENGINE backend"
            if [ "${{ matrix.cfg.platform }}" = "linux-64" ] || [ "${{ matrix.cfg.platform }}" = "linux-arm64" ]; then
              cat "$HOME/.config/neurodeskapp/logs/main.log" 2>/dev/null || true
            fi
            exit 1
          fi

          # Verify token format
          if ! echo "$TOKEN" | grep -qE '^jlab:srvr:[a-f0-9]+$'; then
            echo "FAIL: Token not in expected jlab:srvr:<hex> format: $TOKEN"
            exit 1
          fi
          echo "PASS: Backend started with correct token format"

          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "container=$CONTAINER" >> "$GITHUB_OUTPUT"

      - name: 'Test: App-generated docker/podman flags are correct'
        if: matrix.cfg.engine == 'docker' || matrix.cfg.engine == 'podman'
        run: |
          ENGINE="${{ matrix.cfg.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          echo "=== Inspecting container config generated by server.ts ($ENGINE) ==="

          # Verify --privileged
          PRIV=$($ENGINE inspect "$CONTAINER_NAME" --format '{{.HostConfig.Privileged}}')
          if [ "$PRIV" = "true" ]; then
            echo "PASS: Container is privileged"
          else
            echo "FAIL: Container is not privileged"
            exit 1
          fi

          # Verify volume mounts exist
          echo "=== Volume mounts ==="
          $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{"\n"}}{{end}}'

          # Verify neurodesktop-storage mount
          if $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Mounts}}{{.Destination}}{{"\n"}}{{end}}' | grep -q '/neurodesktop-storage'; then
            echo "PASS: /neurodesktop-storage mount present"
          else
            echo "FAIL: /neurodesktop-storage mount missing"
            exit 1
          fi

          # Verify /data mount (from --working-dir)
          if $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Mounts}}{{.Destination}}{{"\n"}}{{end}}' | grep -q '/data'; then
            echo "PASS: /data mount present (working dir)"
          else
            echo "FAIL: /data mount missing - server.ts did not mount working dir"
            exit 1
          fi

          # Verify NEURODESKTOP_VERSION env var
          if $ENGINE inspect "$CONTAINER_NAME" --format '{{range .Config.Env}}{{.}}{{"\n"}}{{end}}' | grep -q 'NEURODESKTOP_VERSION='; then
            echo "PASS: NEURODESKTOP_VERSION env var set"
          else
            echo "FAIL: NEURODESKTOP_VERSION env var missing"
            exit 1
          fi

      - name: Wait for Jupyter server ready
        id: container_startup_step
        run: |
          PORT=${{ steps.container.outputs.port }}
          TOKEN=${{ steps.container.outputs.token }}
          URL="http://127.0.0.1:${PORT}/lab?token=${TOKEN}"

          echo "Waiting for Jupyter at $URL ..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] 2>/dev/null; then
              echo "Server is up (HTTP $STATUS) after $((i * 5))s"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - waiting 5s..."
            sleep 5
          done

          echo "Server failed to start within 5 minutes"
          echo "=== Container/VM logs ==="
          if [ "${{ matrix.cfg.engine }}" != "tinyrange" ]; then
            ${{ matrix.cfg.engine }} logs "${{ steps.container.outputs.container }}" 2>&1 || true
          fi
          exit 1

      # ───────────────────────────────────────────────
      # Container functionality tests
      # Docker/Podman: docker exec; TinyRange: Jupyter kernel API
      # ───────────────────────────────────────────────

      - name: 'Test: Unit tests inside container via pytest (Docker/Podman)'
        if: matrix.cfg.engine == 'docker' || matrix.cfg.engine == 'podman'
        run: |
          ENGINE="${{ matrix.cfg.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          # Fix .cache ownership (NB_UID remapping can leave it owned by wrong UID)
          $ENGINE exec "$CONTAINER_NAME" \
            chown -R jovyan:jovyan /home/jovyan/.cache 2>/dev/null || true

          $ENGINE exec -u jovyan "$CONTAINER_NAME" \
            pytest /opt/tests/ -v

          echo 'PASS: All unit tests passed'

      - name: 'Test: Pytest suite via Jupyter kernel (TinyRange)'
        if: matrix.cfg.engine == 'tinyrange'
        run: |
          PORT=${{ steps.container.outputs.port }}
          TOKEN=${{ steps.container.outputs.token }}
          BASE_URL="http://127.0.0.1:${PORT}"

          python3 scripts/jupyter_exec.py \
            --url "$BASE_URL" \
            --token "$TOKEN" \
            --pytest /opt/tests/ \
            --ignore /opt/tests/test_slurm.py

      # ───────────────────────────────────────────────
      # Shutdown test
      # ───────────────────────────────────────────────

      - name: 'Test: Clean shutdown via app (SIGTERM -> backend stop)'
        if: always() && steps.container_startup_step.outcome == 'success'
        run: |
          ENGINE="${{ matrix.cfg.engine }}"
          CONTAINER_NAME=${{ steps.container.outputs.container }}

          echo "=== Sending SIGTERM to Electron app by process name ==="
          if [ "${{ matrix.cfg.platform }}" = "win" ]; then
            # Graceful termination request by image name (no /F = not forced)
            taskkill //IM NeurodeskApp.exe //T 2>/dev/null || true
          elif [ "${{ matrix.cfg.platform }}" = "mac" ]; then
            # Match on full command path since macOS binary name varies
            pkill -TERM -f "NeurodeskApp.app/Contents/MacOS/NeurodeskApp" || true
          else
            # Exact match on Linux binary name, avoids hitting xvfb-run or Xvfb
            pkill -TERM -x neurodeskapp || true
          fi

          echo "=== Waiting for backend to stop ==="
          if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
            for i in $(seq 1 12); do
              if ! $ENGINE ps -q -f "name=$CONTAINER_NAME" | grep -q .; then
                echo "PASS: Container stopped after app shutdown ($((i * 5))s)"
                exit 0
              fi
              sleep 5
            done
            echo "WARN: Container did not stop within 60s after app shutdown"
            echo "This means the app's dispose -> killAllServers -> server.stop chain may not be working"
            exit 1
          else
            # TinyRange: check that the port is no longer listening
            PORT=${{ steps.container.outputs.port }}
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:${PORT}/" 2>/dev/null || true)
              if [ "$STATUS" = "000" ]; then
                echo "PASS: TinyRange VM stopped after app shutdown ($((i * 5))s)"
                exit 0
              fi
              sleep 5
            done
            echo "WARN: TinyRange port still responding after 60s"
            exit 1
          fi

      # ───────────────────────────────────────────────
      # Cleanup
      # ───────────────────────────────────────────────

      - name: Cleanup
        if: always()
        run: |
          ENGINE="${{ matrix.cfg.engine }}"

          echo "=== App stdout/stderr ==="
          APP_LOG="${{ steps.app.outputs.app_log }}"
          if [ -n "$APP_LOG" ] && [ -f "$APP_LOG" ]; then
            cat "$APP_LOG" 2>/dev/null || true
          else
            echo "No app stdout log found"
          fi

          echo "=== Electron app logs ==="
          if [ "${{ matrix.cfg.platform }}" = "linux-64" ] || [ "${{ matrix.cfg.platform }}" = "linux-arm64" ]; then
            LOG_FILE="$HOME/.config/neurodeskapp/logs/main.log"
          elif [ "${{ matrix.cfg.platform }}" = "mac" ]; then
            LOG_FILE="$HOME/Library/Logs/neurodeskapp/main.log"
          else
            LOG_FILE="$APPDATA/neurodeskapp/logs/main.log"
          fi
          if [ -f "$LOG_FILE" ]; then
            echo "--- $LOG_FILE ---"
            cat "$LOG_FILE" 2>/dev/null || true
          else
            echo "No electron log file found at $LOG_FILE"
          fi

          echo "=== Container/VM logs ==="
          if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
            CONTAINER_NAME=${{ steps.container.outputs.container }}
            if [ -n "$CONTAINER_NAME" ] && $ENGINE info &>/dev/null; then
              $ENGINE logs "$CONTAINER_NAME" 2>&1 | tail -50 || true
            fi
          fi

          echo "=== Force cleanup ==="
          # Kill app if still running (by process name, not PID)
          if [ "${{ matrix.cfg.platform }}" = "win" ]; then
            taskkill //IM NeurodeskApp.exe //T //F 2>/dev/null || true
          elif [ "${{ matrix.cfg.platform }}" = "mac" ]; then
            pkill -9 -f "NeurodeskApp.app/Contents/MacOS/NeurodeskApp" 2>/dev/null || true
          else
            pkill -9 -x neurodeskapp 2>/dev/null || true
          fi

          # Remove any leftover containers (Docker/Podman)
          if [ "$ENGINE" = "docker" ] || [ "$ENGINE" = "podman" ]; then
            if $ENGINE info &>/dev/null; then
              $ENGINE ps -a --filter "name=neurodeskapp" --format "{{.Names}}" | while read name; do
                $ENGINE rm -f "$name" 2>/dev/null || true
              done
              $ENGINE volume rm neurodesk-home 2>/dev/null || true
            else
              echo "Docker/Podman daemon not available — skipping container cleanup"
            fi
          fi

          # Kill any leftover tinyrange/qemu processes
          if [ "$ENGINE" = "tinyrange" ]; then
            killall tinyrange 2>/dev/null || true
            killall qemu-system-x86_64 2>/dev/null || true
          fi

          # Clean up test files
          WORKING_DIR="${{ steps.app.outputs.working_dir }}"
          rm -rf "$WORKING_DIR" 2>/dev/null || true
          rm -rf ~/neurodesktop-storage/ci-test.txt ~/neurodesktop-storage/ci-host-test.txt ~/neurodesktop-storage/ci-subdir 2>/dev/null || true
